<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a78d6"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- self-contained surface: identical on GitHub light & dark -->
  <rect x="0" y="0" width="920" height="560" rx="14" fill="#fcfcfb" stroke="#e1e0d9"/>

  <!-- title + decision legend -->
  <text x="32" y="42" font-size="21" font-weight="700" fill="#0b0b0b">LeAgents</text>
  <text x="130" y="42" font-size="12.5" fill="#52514e">deterministic loop · agents propose, a pure function decides</text>
  <g font-size="11" fill="#52514e">
    <circle cx="556" cy="38" r="4" fill="#0ca30c"/><text x="565" y="42">promote</text>
    <circle cx="642" cy="38" r="4" fill="#898781"/><text x="651" y="42">iterate</text>
    <circle cx="716" cy="38" r="4" fill="#fab219"/><text x="725" y="42">escalate</text>
    <circle cx="804" cy="38" r="4" fill="#ec835a"/><text x="813" y="42">rollback</text>
  </g>

  <!-- orchestrator -->
  <rect x="32" y="64" width="856" height="120" rx="10" fill="#eef4fc" stroke="#c9ddf5"/>
  <text x="48" y="88" font-size="12.5" font-weight="700" fill="#0b0b0b">Orchestrator</text>
  <text x="140" y="88" font-size="10.5" fill="#898781">plain Python state machine + SQLite — never an LLM</text>

  <rect x="48" y="100" width="262" height="66" rx="8" fill="#fcfcfb" stroke="#e1e0d9"/>
  <text x="62" y="122" font-size="12" font-weight="600" fill="#0b0b0b">Proposer</text>
  <text x="62" y="139" font-size="10.5" fill="#52514e">LLM (any provider) or deterministic;</text>
  <text x="62" y="153" font-size="10.5" fill="#52514e">reads the knowledge wiki as context</text>

  <rect x="329" y="100" width="262" height="66" rx="8" fill="#fcfcfb" stroke="#e1e0d9"/>
  <text x="343" y="122" font-size="12" font-weight="600" fill="#0b0b0b">Constitution gate</text>
  <text x="343" y="139" font-size="10.5" fill="#52514e">sim-only in M0 · real-hardware and</text>
  <text x="343" y="153" font-size="10.5" fill="#52514e">CVE-affected paths denied + audited</text>

  <rect x="610" y="100" width="262" height="66" rx="8" fill="#fcfcfb" stroke="#e1e0d9"/>
  <text x="624" y="122" font-size="12" font-weight="600" fill="#0b0b0b">Loop controller</text>
  <text x="624" y="139" font-size="10.5" fill="#52514e">decide(Δ success) → promote · iterate ·</text>
  <text x="624" y="153" font-size="10.5" fill="#52514e">escalate (≥ floor) · rollback — budgets</text>

  <!-- dispatch / feedback arrows -->
  <line x1="330" y1="184" x2="330" y2="234" stroke="#2a78d6" stroke-width="1.6" marker-end="url(#ab)"/>
  <text x="220" y="212" font-size="10.5" fill="#2a78d6">dispatch each cycle</text>
  <line x1="580" y1="234" x2="580" y2="184" stroke="#2a78d6" stroke-width="1.6" marker-end="url(#ab)"/>
  <text x="590" y="212" font-size="10.5" fill="#2a78d6">eval report</text>
  <line x1="800" y1="234" x2="800" y2="184" stroke="#2a78d6" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ab)"/>
  <text x="808" y="212" font-size="10.5" fill="#2a78d6">context</text>

  <!-- agents row -->
  <g>
    <rect x="32" y="238" width="196" height="86" rx="8" fill="#fcfcfb" stroke="#c3c2b7"/>
    <text x="46" y="260" font-size="12" font-weight="600" fill="#0b0b0b">Data Agent</text>
    <text x="46" y="277" font-size="10.5" fill="#52514e">resolve seed dataset ·</text>
    <text x="46" y="291" font-size="10.5" fill="#52514e">progressive episode schedule</text>
    <text x="46" y="308" font-size="10" fill="#898781">M1: curate · amplify · augment</text>

    <rect x="252" y="238" width="196" height="86" rx="8" fill="#fcfcfb" stroke="#c3c2b7"/>
    <text x="266" y="260" font-size="12" font-weight="600" fill="#0b0b0b">Train Agent</text>
    <text x="266" y="277" font-size="10.5" fill="#52514e">lerobot-train subprocess ·</text>
    <text x="266" y="291" font-size="10.5" fill="#52514e">continues from blessed ckpt ·</text>
    <text x="266" y="305" font-size="10.5" fill="#52514e">policy ladder SmolVLA → π0.5</text>

    <rect x="472" y="238" width="196" height="86" rx="8" fill="#fcfcfb" stroke="#c3c2b7"/>
    <text x="486" y="260" font-size="12" font-weight="600" fill="#0b0b0b">Eval Agent</text>
    <text x="486" y="277" font-size="10.5" fill="#52514e">lerobot-eval subprocess ·</text>
    <text x="486" y="291" font-size="10.5" fill="#52514e">LIBERO gate before any</text>
    <text x="486" y="305" font-size="10.5" fill="#52514e">checkpoint promotion</text>

    <rect x="692" y="238" width="196" height="86" rx="8" fill="#fcfcfb" stroke="#c3c2b7"/>
    <text x="706" y="260" font-size="12" font-weight="600" fill="#0b0b0b">Knowledge Agent</text>
    <text x="706" y="277" font-size="10.5" fill="#52514e">distills every cycle into OKF</text>
    <text x="706" y="291" font-size="10.5" fill="#52514e">wiki pages with provenance ·</text>
    <text x="706" y="305" font-size="10.5" fill="#52514e">periodic lint pass</text>
  </g>

  <!-- storage arrows -->
  <line x1="130" y1="324" x2="130" y2="388" stroke="#898781" stroke-width="1.4" marker-end="url(#ag)"/>
  <text x="138" y="360" font-size="10" fill="#898781">episodes ref</text>
  <line x1="350" y1="324" x2="350" y2="388" stroke="#898781" stroke-width="1.4" marker-start="url(#ag)" marker-end="url(#ag)"/>
  <text x="358" y="352" font-size="10" fill="#898781">reads episodes</text>
  <text x="358" y="365" font-size="10" fill="#898781">writes checkpoints</text>
  <line x1="570" y1="324" x2="570" y2="388" stroke="#898781" stroke-width="1.4" marker-end="url(#ag)"/>
  <text x="578" y="360" font-size="10" fill="#898781">events + decisions</text>
  <line x1="790" y1="324" x2="790" y2="388" stroke="#898781" stroke-width="1.4" marker-end="url(#ag)"/>
  <text x="798" y="360" font-size="10" fill="#898781">pages</text>

  <!-- storage row -->
  <rect x="32" y="392" width="416" height="74" rx="8" fill="#f4f3ef" stroke="#e1e0d9"/>
  <text x="46" y="415" font-size="12" font-weight="600" fill="#0b0b0b">Hugging Face Hub — the shared contract</text>
  <text x="46" y="433" font-size="10.5" fill="#52514e">LeRobotDataset v3.0 (Parquet + MP4 shards, partial download)</text>
  <text x="46" y="447" font-size="10.5" fill="#52514e">+ policy checkpoints (blessed = current baseline)</text>

  <rect x="472" y="392" width="196" height="74" rx="8" fill="#f4f3ef" stroke="#e1e0d9"/>
  <text x="486" y="415" font-size="12" font-weight="600" fill="#0b0b0b">SQLite + events.jsonl</text>
  <text x="486" y="433" font-size="10.5" fill="#52514e">runs · cycles · decisions ·</text>
  <text x="486" y="447" font-size="10.5" fill="#52514e">resumable job records</text>

  <rect x="692" y="392" width="196" height="74" rx="8" fill="#f4f3ef" stroke="#e1e0d9"/>
  <text x="706" y="415" font-size="12" font-weight="600" fill="#0b0b0b">knowledge/ wiki</text>
  <text x="706" y="433" font-size="10.5" fill="#52514e">OKF markdown + frontmatter ·</text>
  <text x="706" y="447" font-size="10.5" fill="#52514e">observed-once → replicated</text>

  <!-- dashboard -->
  <line x1="570" y1="466" x2="570" y2="498" stroke="#898781" stroke-width="1.4" marker-end="url(#ag)"/>
  <rect x="32" y="500" width="856" height="40" rx="8" fill="#eef4fc" stroke="#c9ddf5"/>
  <text x="46" y="525" font-size="12" font-weight="600" fill="#0b0b0b">Dashboard</text>
  <text x="128" y="525" font-size="10.5" fill="#52514e">leagents dash — live cycle pipeline · decisions · eval success chart · rollout videos · event log · knowledge browser</text>
</svg>
