# M0: automated cycles on LIBERO in simulation (DESIGN.md §8).
run_name: m0-libero-smolvla
workdir: runs

# Seed dataset in LeRobotDataset v3.0 format. Verify the repo id against the
# LIBERO guide before a real run: https://huggingface.co/docs/lerobot/main/en/libero
seed_dataset: HuggingFaceVLA/libero

# Policy escalation ladder (DESIGN.md §3.3): fine-tune SmolVLA first,
# escalate to pi0.5 when SmolVLA plateaus.
policy_ladder:
  - name: smolvla
    init: lerobot/smolvla_base   # 450M base; ~4h / 20k steps on one A100
  - name: pi05
    init: lerobot/pi05_base

budgets:
  max_cycles: 3
  max_gpu_hours: 24

# Success-rate deltas (fractions) driving promote/iterate/escalate/rollback.
thresholds:
  promote_delta: 0.05
  regression_delta: 0.05
  plateau_epsilon: 0.01
  plateau_cycles: 2

train:
  steps: 20000
  batch_size: 64
  extra_args: []   # e.g. ["--policy.device=cuda", "--wandb.enable=true"]

eval:
  env_type: libero
  task_suite: libero_spatial
  n_episodes: 10
  extra_args: []

# Provider-agnostic LLM for the proposer and knowledge lessons (optional).
# Examples: "anthropic:claude-sonnet-5", "openai:gpt-5.2",
#           "openai:qwen3@http://localhost:11434/v1" (any OpenAI-compatible server)
# null -> deterministic proposer, append-only knowledge pages.
llm: null

# OKF knowledge layer (DESIGN.md §3.6): pages under knowledge/ updated each cycle.
knowledge:
  enabled: true
  root: knowledge

constitution: configs/constitution.yaml
