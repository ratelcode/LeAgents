# M0: automated cycles on LIBERO in simulation (DESIGN.md §8).
# All flags below were verified against lerobot 0.5.1 on a real GPU —
# see configs/smoke_libero.yaml for the fast (~5 min) variant.
run_name: m0-libero-smolvla
workdir: runs

# Seed dataset in LeRobotDataset v3.0 format (~70 GB total).
# https://huggingface.co/datasets/HuggingFaceVLA/libero
seed_dataset: HuggingFaceVLA/libero

# Progressive data schedule (flywheel-lite): cycle N trains on the first
# initial_episodes * growth^N episodes. Weights carry over between cycles of
# the same policy (train.continue_from_blessed), so eval deltas track growth.
data:
  initial_episodes: 40
  growth: 2.0
  max_episodes: 320

# Policy escalation ladder (DESIGN.md §3.3): fine-tune SmolVLA first,
# escalate to pi0.5 when SmolVLA plateaus.
policy_ladder:
  - name: smolvla
    init: lerobot/smolvla_base   # 450M base
  - name: pi05
    init: lerobot/pi05_base

budgets:
  max_cycles: 3
  max_gpu_hours: 24

# Success-rate deltas (fractions) driving promote/iterate/escalate/rollback.
thresholds:
  promote_delta: 0.05
  regression_delta: 0.05
  plateau_epsilon: 0.01
  plateau_cycles: 2

# SmolVLA base expects observation.images.camera1/2/3; the LIBERO dataset and
# env both expose image (agentview) / image2 (eye-in-hand). 2-of-3 cameras
# passes lerobot's subset feature check. Do NOT use --dataset.streaming with
# action-chunking policies (empty batches on 0.5.1) — DESIGN.md §3.3.
train:
  steps: 20000
  batch_size: 16
  continue_from_blessed: true
  extra_args:
    - --policy.device=cuda
    - --save_freq=5000
    - --log_freq=100
    - '--rename_map={"observation.images.image": "observation.images.camera1", "observation.images.image2": "observation.images.camera2"}'

eval:
  env_type: libero
  task_suite: libero_spatial
  n_episodes: 10
  batch_size: 5
  extra_args:
    - --policy.device=cuda
    - '--rename_map={"observation.images.image": "observation.images.camera1", "observation.images.image2": "observation.images.camera2"}'

# Provider-agnostic LLM for the proposer and knowledge lessons (optional).
# Examples: "anthropic:claude-sonnet-5", "openai:gpt-5.2",
#           "openai:qwen3@http://localhost:11434/v1" (any OpenAI-compatible server)
# null -> deterministic proposer, append-only knowledge pages.
llm: null

# OKF knowledge layer (DESIGN.md §3.6): pages under knowledge/ updated each cycle.
knowledge:
  enabled: true
  root: knowledge

constitution: configs/constitution.yaml
