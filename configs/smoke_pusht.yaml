# Real-GPU smoke: one short cycle on PushT (2D, no EGL/MuJoCo needed).
# Validates the real lerobot-train/lerobot-eval subprocess path end-to-end;
# the policy is deliberately under-trained — this checks plumbing, not skill.
run_name: smoke-pusht
workdir: runs
seed_dataset: lerobot/pusht

policy_ladder:
  - name: diffusion   # from scratch; canonical pairing with lerobot/pusht

budgets:
  max_cycles: 1
  max_gpu_hours: 1

thresholds:
  promote_delta: 0.05
  regression_delta: 0.05
  plateau_epsilon: 0.01
  plateau_cycles: 2

train:
  steps: 30
  batch_size: 8
  extra_args: ["--policy.device=cuda", "--num_workers=2", "--log_freq=10", "--save_freq=30"]

eval:
  env_type: pusht
  task_suite: PushT-v0
  n_episodes: 2
  extra_args: ["--policy.device=cuda"]

llm: null
knowledge:
  enabled: true
  root: knowledge

constitution: configs/constitution.yaml
