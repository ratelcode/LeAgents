# Scale run: the first run sized to actually move success rate.
# Data grows toward the full libero_spatial set (432 episodes exist, ~43/task;
# the well runs dry at cycle 2), weights carry over between cycles, and on any
# promotion with success > 0 the loop harvests success-filtered rollouts and
# merges them into a growing, seed-compatible mix (image dtype, seed fps,
# panda, real language instructions — so it can be blended into training).
# There is NO separate "adapt on the mix alone" stage: that overfit and
# regressed a run 63% -> 20% (see the improve block). (~6 h on one 16 GB GPU.)
run_name: m0-libero-scale
workdir: runs
seed_dataset: HuggingFaceVLA/libero

data:
  initial_episodes: 200   # 20 per task
  growth: 1.6             # 200 -> 320 -> 500 (capped)
  max_episodes: 500       # ~50 per task, the verified SmolVLA guidance
  task_filter: libero_spatial   # match training episodes to the eval suite

policy_ladder:
  - name: smolvla
    init: lerobot/smolvla_base
  - name: pi05
    init: lerobot/pi05_base

budgets:
  max_cycles: 3
  max_gpu_hours: 12

thresholds:
  promote_delta: 0.05
  regression_delta: 0.05
  plateau_epsilon: 0.01
  plateau_cycles: 2
  escalate_floor: 0.05

train:
  steps: 20000
  batch_size: 8
  continue_from_blessed: true
  extra_args:
    - --policy.device=cuda
    - --save_freq=5000
    - --log_freq=100
    - '--rename_map={"observation.images.image": "observation.images.camera1", "observation.images.image2": "observation.images.camera2"}'

eval:
  env_type: libero
  task_suite: libero_spatial
  n_episodes: 10   # per task on LIBERO -> 100 episodes per eval
  batch_size: 2    # parallel envs; 5 OOMs a 16 GB card
  extra_args:
    - --policy.device=cuda
    - '--rename_map={"observation.images.image": "observation.images.camera1", "observation.images.image2": "observation.images.camera2"}'

# Harvest on promotion (success > 0): collect success-filtered rollouts and
# merge them into a growing mix. The mix is built seed-compatible (via
# --match-dataset, which copies the seed's fps + robot_type, plus image dtype
# and real LIBERO language instructions) so it CAN be blended into a later
# cycle's training — but there is no "adapt on the mix alone" stage, which
# overfit and regressed a run 63% -> 20%. eval/promote judge the main-trained
# checkpoint. (provenance: run 20260704-232610, cycle 1)
improve:
  enabled: true
  episodes: 20
  device: cuda
  # the policy expects camera1/2 — same mapping as train/eval; without it
  # make_policy's feature check kills the harvest (scale v4 cycle 0 lesson)
  extra_args:
    - '--rename-map={"observation.images.image": "observation.images.camera1", "observation.images.image2": "observation.images.camera2"}'

llm: null
knowledge:
  enabled: true
  root: knowledge

constitution: configs/constitution.yaml
